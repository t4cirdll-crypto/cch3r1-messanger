name: cch3r1_messanger
description: Минималистичный личный мессенджер на Flutter + Supabase.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State / DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Models / serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.6

  # Local DB
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Images
  cached_network_image: ^3.3.1

  # Utils
  connectivity_plus: ^6.0.3
  dynamic_color: ^1.7.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  shimmer: ^3.0.0
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8

  # Settings / preferences
  shared_preferences: ^2.3.0

  # GIF / Notifications
  http: ^1.2.0
  flutter_local_notifications: ^17.2.0

  # Attachments
  file_picker: ^8.1.2
  mime: ^1.0.5
  permission_handler: ^11.3.1
  record: ^5.1.2
  just_audio: ^0.9.40
  video_player: ^2.9.1
  open_filex: ^4.5.0

dependency_overrides:
  # record 5.2.1 транзитивно тянет record_linux 0.7.2, который не реализует
  # новые члены record_platform_interface 1.5.0 → ошибка компиляции даже
  # для Android. Принудительно поднимаем record_linux до совместимой версии.
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
