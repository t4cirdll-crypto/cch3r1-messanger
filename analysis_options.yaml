include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "ui_legacy/**"
  errors:
    invalid_annotation_target: ignore
    # UseCase<T,P> объявляет call(P params), конкретные use-case'ы
    # переименовывают в доменное имя (username / conversationId / file).
    # Это документированное архитектурное решение — лишний шум отключаем.
    avoid_renaming_method_parameters: ignore

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    avoid_print: true
